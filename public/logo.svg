<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#ff6584"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="50%" style="stop-color:#ff6584"/>
      <stop offset="100%" style="stop-color:#ffd166"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffd166"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="4" y="8" width="64" height="64" rx="16" fill="url(#iconBg)" filter="url(#glow)"/>

  <!-- Download arrow icon -->
  <line x1="36" y1="18" x2="36" y2="44" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
  <polyline points="22,34 36,50 50,34" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="20" y1="60" x2="52" y2="60" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round"/>

  <!-- GTS text -->
  <text x="82" y="46" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="36" fill="url(#textGrad)" letter-spacing="2">GTS</text>

  <!-- Downloader text -->
  <text x="84" y="64" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="13" fill="#888888" letter-spacing="4">DOWNLOADER</text>
</svg>
