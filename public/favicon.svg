<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#ff6584"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffd166;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Download arrow -->
  <line x1="32" y1="10" x2="32" y2="38" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
  <polyline points="18,28 32,44 46,28" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Base line -->
  <line x1="16" y1="54" x2="48" y2="54" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round"/>
</svg>
